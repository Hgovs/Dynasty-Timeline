<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Georgia", "Times New Roman", serif;
    background: linear-gradient(135deg, #1a0f0a 0%, #2d1810 50%, #1a0f0a 100%);
    color: #f5e6d3;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }
  .header { text-align: center; margin-bottom: 50px; }
  .header h1 {
    font-size: 2.4rem;
    font-weight: 700;
    background: linear-gradient(90deg, #d4af37, #e8c547, #b8860b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .header p { color: #c9b18c; font-size: 1rem; font-style: italic; }
  .toolbar {
    text-align: center;
    margin-bottom: 30px;
  }
  .toolbar button {
    background: rgba(212, 175, 55, 0.15);
    border: 1px solid rgba(212, 175, 55, 0.4);
    color: #f5e6d3;
    padding: 8px 18px;
    border-radius: 20px;
    margin: 0 5px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    transition: background 0.2s;
  }
  .toolbar button:hover { background: rgba(212, 175, 55, 0.3); }
  .sync-status {
    display: inline-block;
    padding: 6px 14px;
    margin-right: 10px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-family: -apple-system, sans-serif;
    letter-spacing: 0.5px;
    border: 1px solid rgba(148, 163, 184, 0.3);
    color: #94a3b8;
  }
  .sync-status.live { color: #8bc18b; border-color: rgba(139, 193, 139, 0.5); background: rgba(139, 193, 139, 0.1); }
  .sync-status.live::before { content: "● "; color: #8bc18b; }
  .sync-status.error { color: #e88b8b; border-color: rgba(232, 139, 139, 0.5); background: rgba(232, 139, 139, 0.1); }

  .dynasty-section { max-width: 1200px; margin: 0 auto 60px; }
  .dynasty-title {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 30px;
    padding: 12px;
    border-top: 1px solid rgba(212, 175, 55, 0.3);
    border-bottom: 1px solid rgba(212, 175, 55, 0.3);
    letter-spacing: 3px;
  }
  .dynasty-sui .dynasty-title { color: #6bb6c7; }
  .dynasty-tang .dynasty-title { color: #e8b04b; }
  .dynasty-song .dynasty-title { color: #8bc18b; }

  .timeline {
    position: relative;
    padding: 30px 0;
  }
  .timeline::before {
    content: "";
    position: absolute;
    top: 75px;
    left: 3%;
    right: 3%;
    height: 3px;
    border-radius: 2px;
    z-index: 0;
  }
  .dynasty-sui .timeline::before { background: linear-gradient(90deg, #4a90a4, #6bb6c7, #4a90a4); }
  .dynasty-tang .timeline::before { background: linear-gradient(90deg, #b8860b, #e8b04b, #b8860b); }
  .dynasty-song .timeline::before { background: linear-gradient(90deg, #4a8e4a, #8bc18b, #4a8e4a); }

  .events {
    display: flex;
    justify-content: space-around;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
    gap: 15px;
  }

  .event {
    flex: 1 1 0;
    min-width: 130px;
    max-width: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
  }

  .circle {
    width: 95px;
    height: 95px;
    border-radius: 50%;
    border: 3px solid #1a0f0a;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 0.85rem;
    text-align: center;
    line-height: 1.15;
    transition: transform 0.25s, box-shadow 0.25s;
    padding: 8px;
    outline: none;
  }
  .dynasty-sui .circle {
    background: linear-gradient(135deg, #4a90a4, #6bb6c7);
    box-shadow: 0 0 0 2px #4a90a4, 0 6px 16px rgba(74, 144, 164, 0.4);
  }
  .dynasty-tang .circle {
    background: linear-gradient(135deg, #b8860b, #e8b04b);
    box-shadow: 0 0 0 2px #b8860b, 0 6px 16px rgba(184, 134, 11, 0.4);
  }
  .dynasty-song .circle {
    background: linear-gradient(135deg, #4a8e4a, #8bc18b);
    box-shadow: 0 0 0 2px #4a8e4a, 0 6px 16px rgba(74, 142, 74, 0.4);
  }
  .event:hover .circle { transform: scale(1.1); }
  .event.active .circle { transform: scale(1.18); }
  .dynasty-sui .event.active .circle { box-shadow: 0 0 0 3px #6bb6c7, 0 10px 24px rgba(107, 182, 199, 0.7); }
  .dynasty-tang .event.active .circle { box-shadow: 0 0 0 3px #e8b04b, 0 10px 24px rgba(232, 176, 75, 0.7); }
  .dynasty-song .event.active .circle { box-shadow: 0 0 0 3px #8bc18b, 0 10px 24px rgba(139, 193, 139, 0.7); }

  .event-label {
    margin-top: 14px;
    color: #e8d5b7;
    font-weight: 600;
    text-align: center;
    font-size: 0.9rem;
    padding: 4px 6px;
    border-radius: 4px;
    width: 100%;
  }

  /* Detail panel */
  .detail-panel {
    max-width: 950px;
    margin: 40px auto 0;
    background: rgba(45, 24, 16, 0.8);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 12px;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease, padding 0.3s ease, margin 0.3s;
    padding: 0 32px;
  }
  .detail-panel.open {
    max-height: 2000px;
    opacity: 1;
    padding: 28px 32px;
    margin-bottom: 40px;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .panel-header h2 {
    color: #f5e6d3;
    font-size: 1.5rem;
    outline: none;
  }
  .panel-header h2:focus { background: rgba(212, 175, 55, 0.1); border-radius: 4px; padding: 2px 6px; }
  .date-edit {
    display: inline-block;
    color: #d4af37;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 4px;
    outline: none;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(212, 175, 55, 0.08);
  }
  .date-edit:focus { background: rgba(212, 175, 55, 0.2); }
  .close-btn {
    background: rgba(212, 175, 55, 0.1);
    border: 1px solid rgba(212, 175, 55, 0.3);
    color: #c9b18c;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .close-btn:hover { background: rgba(212, 175, 55, 0.25); }

  .thesis-block {
    background: rgba(212, 175, 55, 0.08);
    border-left: 3px solid #d4af37;
    padding: 14px 18px;
    border-radius: 4px;
    margin-bottom: 22px;
  }
  .thesis-label {
    color: #d4af37;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }
  .thesis-text {
    color: #f5e6d3;
    font-style: italic;
    line-height: 1.6;
    outline: none;
    min-height: 50px;
  }
  .thesis-text:focus { background: rgba(212, 175, 55, 0.05); border-radius: 4px; }
  .thesis-text:empty::before {
    content: "Click here to write your thesis statement for this dynasty...";
    color: #8a7a5a;
  }

  .detail-content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items: start;
  }
  @media (max-width: 720px) {
    .detail-content { grid-template-columns: 1fr; }
  }

  .image-area {
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 10px;
    background: rgba(212, 175, 55, 0.05);
    border: 2px dashed rgba(212, 175, 55, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
  }
  .image-area:hover { border-color: rgba(212, 175, 55, 0.7); }
  .image-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .image-placeholder {
    text-align: center;
    color: #8a7a5a;
    padding: 20px;
  }
  .image-placeholder .plus { font-size: 2.5rem; margin-bottom: 6px; }
  .image-placeholder .label { font-size: 0.85rem; }
  .image-controls {
    position: absolute;
    bottom: 8px;
    right: 8px;
    display: flex;
    gap: 6px;
  }
  .img-btn {
    background: rgba(0, 0, 0, 0.7);
    color: white;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 0.75rem;
    font-family: inherit;
  }
  .img-btn:hover { background: rgba(0, 0, 0, 0.9); }

  .bullets-area h3 {
    color: #d4af37;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }
  .bullets-list {
    list-style: none;
    padding: 0;
  }
  .bullet-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(212, 175, 55, 0.1);
  }
  .bullet-item::before {
    content: "▸";
    color: #d4af37;
    font-weight: bold;
    line-height: 1.5;
    flex-shrink: 0;
  }
  .bullet-text {
    flex: 1;
    color: #e8d5b7;
    line-height: 1.5;
    outline: none;
    padding: 2px 4px;
    border-radius: 3px;
    min-height: 22px;
  }
  .bullet-text:focus { background: rgba(212, 175, 55, 0.08); }
  .bullet-text:empty::before {
    content: "Type a bullet point...";
    color: #8a7a5a;
  }
  .delete-bullet {
    background: none;
    border: none;
    color: #8a7a5a;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0 4px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
  }
  .bullet-item:hover .delete-bullet { opacity: 1; }
  .delete-bullet:hover { color: #c95757; }

  .add-bullet {
    background: transparent;
    border: 1px dashed rgba(212, 175, 55, 0.4);
    color: #c9b18c;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    margin-top: 12px;
    transition: background 0.2s;
  }
  .add-bullet:hover { background: rgba(212, 175, 55, 0.1); }

  .edit-hint {
    text-align: center;
    color: #8a7a5a;
    font-size: 0.8rem;
    font-style: italic;
    margin-top: 4px;
  }
</style>
</head>

  const wikiImageCache = {};
  function fetchWikipediaThumbnail(title) {
    if (Object.prototype.hasOwnProperty.call(wikiImageCache, title)) {
      return Promise.resolve(wikiImageCache[title]);
    }
    return fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(title))
      .then(res => res.ok ? res.json() : null)
      .then(data => {
        let url = null;
        if (data) {
          if (data.originalimage && data.originalimage.source) url = data.originalimage.source;
          else if (data.thumbnail && data.thumbnail.source) url = data.thumbnail.source;
        }
        wikiImageCache[title] = url;
        return url;
      })
      .catch(() => { wikiImageCache[title] = null; return null; });

        { date: "10th–13th c.", title: "Commercial Revolution", isThesis: false, image: "",
          bullets: [
            "Expansion of trade through canals like the Grand Canal",
            "Overseas trade with Southeast Asia, India, and the Middle East — using the compass",
            "Urbanization: Hangzhou became a major commercial center",
            "Agricultural surplus"
          ]
        },
        { date: "Song Era", title: "Civil Service Examinations", isThesis: false, image: "",
          bullets: [
            "Merit-based: in theory any male could take the exams, not just nobles",
            "Focused on Confucian texts, poetry, essay writing, and government philosophy",
            "Regional, then national levels",
            "Students became politicians",
            "Promoted education and created a strong government"
          ]
        },
        { date: "11th–12th c.", title: "Neo-Confucianism & Zhu Xi", isThesis: false, image: "",
          bullets: [
            "Focused on ethics, order, and proper behavior",
            "Zhu Xi (1130–1200) systematized Neo-Confucianism",
            "Li (principle) — the \"reason\" of the universe",
            "Qi (material force) — the physical substance of the world",
            "Self-cultivation: reflect and grow",
            "Emphasis on education",
            "Provided a moral and intellectual base for China"
          ]
        },
        { date: "10th–11th c.", title: "Foot Binding Emerges", isThesis: false, image: "",
          bullets: [
            "Binding girls' feet to keep them as small as possible — \"lotus feet\"",
            "Began in early childhood — permanent",
            "Sign of beauty and wealth (women could not do manual labor)",
            "Elite family practice"
          ]
        },
        { date: "1127 CE", title: "Jurchen Invasion", isThesis: false, image: "",
          bullets: [
            "Semi-nomads of northeast Asia who founded the Jin dynasty",
            "Allied with the Song to defeat the Liao, then turned on the Song afterward",
            "1127: capture of the capital Kaifeng by the Jurchens",
            "1127: Jingkang Incident — the Jin captured the emperor and royal family",
            "A major loss and the start of the Song's decline"
          ]
        },
        { date: "1127–1279 CE", title: "Southern Song", isThesis: false, image: "",
          bullets: [
            "Song kept only their southern territory (1127–1279)",
            "Strong economy",
            "Maritime power (great sea trade)",
            "Suffered military weakness"
          ]
        },
        { date: "1279 CE", title: "Mongol Conquest", isThesis: false, image: "",
          bullets: [
            "A weak Song army led to an easy win for the Mongols"
          ]
        }
      ]
    }
  };

  let data = loadData();

  function loadData() {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) return migrateData(JSON.parse(stored));
    } catch (e) {}
    return JSON.parse(JSON.stringify(defaultData));
  }

  // Old auto-generated theses that should be replaced when found exactly.
  // (User-edited theses won't match these strings and will be left alone.)
  const SUPERSEDED_THESES = [
    "The Sui Dynasty reunited China after almost 400 years of disunion and built the foundation for the Tang. But heavy taxes, forced labor on massive projects like the Grand Canal, and three failed invasions of Korea exhausted the population and ended the dynasty in less than 40 years.",
    "The Tang Dynasty made China the most powerful and cosmopolitan empire of its time through strong central government, an expanded civil service exam system, and trade along the Silk Road. The An Lushan Rebellion broke its strength, and the persecution of Buddhism along with the rise of regional warlords slowly brought the dynasty to its end."
  ];

  // Adds any new default entries that aren't in the user's saved data,
  // and fills in EMPTY fields (bullets, thesis, image) from defaults.
  // Never overwrites anything the user has typed themselves.
  function migrateData(stored) {
    if (!stored) return JSON.parse(JSON.stringify(defaultData));
    const merged = JSON.parse(JSON.stringify(stored));
    ["sui", "tang", "song"].forEach(dyn => {
      if (!merged[dyn]) {
        merged[dyn] = JSON.parse(JSON.stringify(defaultData[dyn]));
        return;
      }
      if (!merged[dyn].events) merged[dyn].events = [];
      const existingTitles = new Set(merged[dyn].events.map(e => e.title));
      defaultData[dyn].events.forEach((defEv, idx) => {
        if (!existingTitles.has(defEv.title)) {
          merged[dyn].events.splice(idx, 0, JSON.parse(JSON.stringify(defEv)));
        }
      });
      // For each event that exists in user data, fill in any blank fields from defaults
      merged[dyn].events.forEach(existing => {
        const defEv = defaultData[dyn].events.find(d => d.title === existing.title);
        if (!defEv) return;
        if ((!existing.thesis || !existing.thesis.trim()) && defEv.thesis) {
          existing.thesis = defEv.thesis;
        } else if (defEv.thesis && SUPERSEDED_THESES.indexOf(existing.thesis) !== -1) {
          existing.thesis = defEv.thesis;
        }
        const userHasBullets = existing.bullets && existing.bullets.some(b => b && b.trim() !== "");
        const defaultHasBullets = defEv.bullets && defEv.bullets.some(b => b && b.trim() !== "");
        if (!userHasBullets && defaultHasBullets) {
          existing.bullets = JSON.parse(JSON.stringify(defEv.bullets));
        }
        if ((!existing.image || !existing.image.trim()) && defEv.image) {
          existing.image = defEv.image;
        }
      });
    });
    return merged;
  }
  function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
    if (firebaseRef && !isApplyingRemote) {
      firebaseRef.set(data).catch(err => setSyncStatus("error", "sync error"));
    }
  }

  function setSyncStatus(cls, text) {
    const el = document.getElementById("sync-status");
    if (!el) return;
    el.className = "sync-status " + cls;
    el.textContent = text;
  }

  function initFirebase() {
    if (!FIREBASE_CONFIG.apiKey) {
      setSyncStatus("", "offline (local only)");
      return;
    }
    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      firebaseRef = firebase.database().ref("timelines/" + ROOM_CODE);
      setSyncStatus("", "connecting...");
      firebaseRef.on("value", (snapshot) => {
        const val = snapshot.val();
        setSyncStatus("live", "live · room: " + ROOM_CODE);
        if (val) {
          const migrated = migrateData(val);
          const valStr = JSON.stringify(migrated);
          if (valStr !== JSON.stringify(data)) {
            isApplyingRemote = true;
            data = migrated;
            try { localStorage.setItem(STORAGE_KEY, valStr); } catch (e) {}
            render();
            isApplyingRemote = false;
          }
        } else {
          firebaseRef.set(data);
        }
      }, (err) => setSyncStatus("error", "sync error"));
    } catch (e) {
      setSyncStatus("error", "config error");
    }
  }
  function saveAll() {
    saveData();
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = "Saved ✓";
    setTimeout(() => btn.textContent = orig, 1200);
  }
  function resetAll() {
    if (!confirm("Reset everything to defaults? Your edits will be lost.")) return;
    data = JSON.parse(JSON.stringify(defaultData));
    saveData();
    render();
  }
  function exportJSON() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "dynasty-timeline.json";
    a.click();
  }
  function importJSON() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json,application/json";
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          data = JSON.parse(ev.target.result);
          saveData();
          render();
        } catch (err) { alert("Invalid JSON file."); }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  let activeKey = null; // "sui-2", "tang-0", etc.

  function render() {
    const root = document.getElementById("timeline-root");
    root.innerHTML = "";
    ["sui", "tang", "song"].forEach(dyn => {
      const section = document.createElement("div");
      section.className = "dynasty-section dynasty-" + dyn;
      section.innerHTML =
        '<div class="dynasty-title" contenteditable="true" data-dyn="' + dyn + '" data-field="name">' + escapeHtml(data[dyn].name) + '</div>' +
        '<div class="timeline"><div class="events" id="events-' + dyn + '"></div></div>' +
        '<div class="detail-panel" id="panel-' + dyn + '"></div>';
      root.appendChild(section);

      const eventsEl = section.querySelector("#events-" + dyn);
      data[dyn].events.forEach((ev, i) => {
        const elemKey = dyn + "-" + i;
        const evDiv = document.createElement("div");
        evDiv.className = "event";
        if (activeKey === elemKey) evDiv.classList.add("active");
        evDiv.innerHTML =
          '<div class="circle">' + escapeHtml(ev.date) + '</div>' +
          '<div class="event-label">' + escapeHtml(ev.title) + '</div>';
        evDiv.addEventListener("click", () => openDetail(dyn, i));
        eventsEl.appendChild(evDiv);
      });
    });

    bindEditableFields();
    if (activeKey) {
      const [d, i] = activeKey.split("-");
      openDetail(d, parseInt(i), true);
    }
  }

  function openDetail(dyn, i, keepOpen) {
    const newKey = dyn + "-" + i;
    if (!keepOpen && activeKey === newKey) { closeDetail(); return; }
    activeKey = newKey;

    document.querySelectorAll(".event").forEach(e => e.classList.remove("active"));
    const eventsEl = document.getElementById("events-" + dyn);
    if (eventsEl && eventsEl.children[i]) eventsEl.children[i].classList.add("active");

    // close other panels
    document.querySelectorAll(".detail-panel").forEach(p => {
      p.classList.remove("open");
      p.innerHTML = "";
    });

    const panel = document.getElementById("panel-" + dyn);
    const ev = data[dyn].events[i];

    // Dynasty thesis is stored on the first event but shown at the top of every bubble in the dynasty
    const firstEvent = data[dyn].events[0] || {};
    const thesisKey = dyn + "-0";
    const thesisHtml =
      '<div class="thesis-block">' +
        '<div class="thesis-label">Dynasty Thesis</div>' +
        '<div class="thesis-text" contenteditable="true" data-key="' + thesisKey + '" data-field="thesis">' + escapeHtml(firstEvent.thesis || "") + '</div>' +
      '</div>';

    const imgInner = ev.image
      ? '<img src="' + escapeAttr(ev.image) + '" alt="' + escapeAttr(ev.title) + '" data-original-url="' + escapeAttr(ev.image) + '" onerror="handleImgError(this)" />' +
        '<div class="image-controls">' +
          '<button class="img-btn" onclick="changeImage(\'' + dyn + '\',' + i + ')">Change</button>' +
          '<button class="img-btn" onclick="removeImage(\'' + dyn + '\',' + i + ')">Remove</button>' +
        '</div>'
      : '<div class="image-placeholder"><div class="plus">+</div><div class="label">Click to add image<br/>(upload or paste URL)</div></div>';

    let bulletsHtml = "";
    ev.bullets.forEach((b, bi) => {
      bulletsHtml +=
        '<li class="bullet-item">' +
          '<div class="bullet-text" contenteditable="true" data-key="' + newKey + '" data-field="bullet" data-idx="' + bi + '">' + escapeHtml(b) + '</div>' +
          '<button class="delete-bullet" onclick="deleteBullet(\'' + dyn + '\',' + i + ',' + bi + ')" title="Delete bullet">×</button>' +
        '</li>';
    });

    panel.innerHTML =
      '<div class="panel-header">' +
        '<div>' +
          '<div class="date-edit" contenteditable="true" data-key="' + newKey + '" data-field="date">' + escapeHtml(ev.date) + '</div>' +
          '<h2 contenteditable="true" data-key="' + newKey + '" data-field="title">' + escapeHtml(ev.title) + '</h2>' +
        '</div>' +
        '<button class="close-btn" onclick="closeDetail()">&times;</button>' +
      '</div>' +
      thesisHtml +
      '<div class="detail-content">' +
        '<div class="image-area" onclick="handleImageClick(event, \'' + dyn + '\',' + i + ')">' + imgInner + '</div>' +
        '<div class="bullets-area">' +
          '<h3>Key Points · Events · People · Terms</h3>' +
          '<ul class="bullets-list">' + bulletsHtml + '</ul>' +
          '<button class="add-bullet" onclick="addBullet(\'' + dyn + '\',' + i + ')">+ Add bullet</button>' +
        '</div>' +
      '</div>';

    panel.classList.add("open");
    bindEditableFields();
    if (!keepOpen) {
      setTimeout(() => panel.scrollIntoView({ behavior: "smooth", block: "nearest" }), 150);
    }

    // Auto-fetch a Wikipedia image if no image is set and the user hasn't explicitly removed one
    if (!ev.image && !ev.imageRemoved && WIKI_SEARCH_BY_TITLE[ev.title]) {
      const imgArea = panel.querySelector(".image-area");
      if (imgArea) {
        imgArea.innerHTML = '<div class="image-placeholder"><div class="label">Loading image…</div></div>';
      }
      fetchWikipediaThumbnail(WIKI_SEARCH_BY_TITLE[ev.title]).then(url => {
        if (activeKey !== newKey) return;
        if (!url) {
          if (imgArea) {
            imgArea.innerHTML = '<div class="image-placeholder"><div class="plus">+</div><div class="label">Click to add image<br/>(upload or paste URL)</div></div>';
          }
          return;
        }
        data[dyn].events[i].image = url;
        saveData();
        openDetail(dyn, i, true);
      });
    }
  }

  function closeDetail() {
    activeKey = null;
    document.querySelectorAll(".event").forEach(e => e.classList.remove("active"));
    document.querySelectorAll(".detail-panel").forEach(p => {
      p.classList.remove("open");
      setTimeout(() => { if (!p.classList.contains("open")) p.innerHTML = ""; }, 400);
    });
  }

  function handleImageClick(e, dyn, i) {
    if (e.target.closest(".image-controls")) return;
    if (data[dyn].events[i].image) return; // ignore clicks when image is set (use buttons)
    chooseImage(dyn, i);
  }

  function chooseImage(dyn, i) {
    const choice = prompt("Add image:\n\n• Type a URL and press OK\n• Leave blank and press OK to upload from your computer\n• Press Cancel to abort", "");
    if (choice === null) return;
    if (choice.trim() === "") {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          data[dyn].events[i].image = ev.target.result;
          saveData();
          openDetail(dyn, i, true);
        };
        reader.readAsDataURL(file);
      };
      input.click();
    } else {
      data[dyn].events[i].image = choice.trim();
      saveData();
      openDetail(dyn, i, true);
    }
  }
  function removeImage(dyn, i) {
    data[dyn].events[i].image = "";
    data[dyn].events[i].imageRemoved = true; // prevents auto-refetching
    saveData();
    openDetail(dyn, i, true);
  }
  function changeImage(dyn, i) {
    data[dyn].events[i].imageRemoved = false; // allow auto-fetch / manual override
    chooseImage(dyn, i);
  }

  function addBullet(dyn, i) {
    data[dyn].events[i].bullets.push("");
    saveData();
    openDetail(dyn, i, true);
  }
  function deleteBullet(dyn, i, bi) {
    data[dyn].events[i].bullets.splice(bi, 1);
    if (data[dyn].events[i].bullets.length === 0) data[dyn].events[i].bullets.push("");
    saveData();
    openDetail(dyn, i, true);
  }

  function bindEditableFields() {
    document.querySelectorAll("[contenteditable='true']").forEach(el => {
      if (el.dataset.bound) return;
      el.dataset.bound = "1";
      el.addEventListener("blur", onEdit);
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey && !el.classList.contains("thesis-text") && !el.classList.contains("bullet-text")) {
          e.preventDefault();
          el.blur();
        }
      });
    });
  }

  function onEdit(e) {
    const el = e.target;
    const field = el.dataset.field;
    if (field === "name") {
      data[el.dataset.dyn].name = el.textContent;
    } else if (field === "bullet") {
      const [dyn, i] = el.dataset.key.split("-");
      data[dyn].events[parseInt(i)].bullets[parseInt(el.dataset.idx)] = el.textContent;
    } else if (el.dataset.key) {
      const [dyn, i] = el.dataset.key.split("-");
      data[dyn].events[parseInt(i)][field] = el.textContent;
    }
    saveData();
  }

  // If a direct image URL fails (often due to hotlink protection),
  // retry through a free image proxy. If that also fails, show a clear error.
  window.handleImgError = function(imgEl) {
    const original = imgEl.dataset.originalUrl || imgEl.src;
    if (!imgEl.dataset.proxyTried && !original.includes("wsrv.nl") && !original.startsWith("data:")) {
      imgEl.dataset.proxyTried = "1";
      imgEl.src = "https://wsrv.nl/?url=" + encodeURIComponent(original);
    } else {
      imgEl.style.display = "none";
      const parent = imgEl.parentElement;
      if (parent && !parent.querySelector(".img-error")) {
        const err = document.createElement("div");
        err.className = "image-placeholder img-error";
        err.style.padding = "16px";
        err.innerHTML =
          '<div style="color:#e88b8b;font-weight:600;margin-bottom:6px;">Image won\'t load</div>' +
          '<div style="font-size:0.78rem;line-height:1.4;color:#8a7a5a;">The site is probably blocking it.<br/>Try a Wikipedia image, or upload a file using the Change button.</div>';
        parent.insertBefore(err, imgEl);
      }
    }
  };

  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }
  function escapeAttr(s) {
    return escapeHtml(s).replace(/"/g, "&quot;");
  }

  render();
  initFirebase();
</script>
</body>
</html>
